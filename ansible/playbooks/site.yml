---
# Main playbook: deploy dotfiles and configure machines

- name: Configure all hosts
  hosts: all
  gather_facts: true
  vars:
    ansible_user: pk
    sudo_user: pk
    dotfiles_dir: "{{ lookup('env', 'HOME') }}/dotfiles"
    dotfiles_repo_url: https://github.com/arekseon/dotfiles.git
    shell: zsh
    common_packages:
      - git
      - curl
      - wget
      - tmux
      - nano
      - tree
    linux_packages:
      - build-essential
      - starship
      - figlet
      - lolcat
      - bat
      - eza
      - ripgrep
  roles:
    - dotfiles
    - packages
    - shell
    - tmux

- name: Configure servers with bash (specific)
  hosts: linux_bash
  gather_facts: true
  vars:
    shell: bash
  roles:
    - shell
